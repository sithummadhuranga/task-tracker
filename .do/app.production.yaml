name: task-tracker-backend-production
region: nyc

services:
  - name: backend
    # No GitHub source — DO never reads this repo directly. CI builds the image and pushes it
    # to GitHub Container Registry (public package, free); App Platform only pulls from there.
    image:
      registry_type: GHCR
      registry: sithummadhuranga
      repository: task-tracker-backend-production
      digest: ${IMAGE_DIGEST}
      registry_credentials: ${GHCR_CREDENTIALS}
    http_port: 4000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: production
        type: GENERAL
      - key: PORT
        value: "4000"
        type: GENERAL
      # DATABASE_URL / REDIS_URL are substituted from GitHub Actions secrets at deploy time
      # (see .github/workflows/ci.yml) — no real value is ever committed to this file.
      - key: DATABASE_URL
        value: ${DATABASE_URL}
        type: SECRET
      - key: REDIS_URL
        value: ${REDIS_URL}
        type: SECRET
      - key: JWT_ACCESS_SECRET
        value: ${JWT_ACCESS_SECRET}
        type: SECRET
      - key: CORS_ORIGIN
        value: ${CORS_ORIGIN}
        type: GENERAL
      # Optional bonus feature (POST /tasks/magic-polish) — unset here just means that one
      # endpoint responds 503, not that the app fails to deploy. No GEMINI_MODEL entry: it has
      # an in-code default, same reasoning as leaving AUTH_RATE_LIMIT_* out of this spec.
      - key: GEMINI_API_KEY
        value: ${GEMINI_API_KEY}
        type: SECRET
