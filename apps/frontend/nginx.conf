server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # React Router uses client-side routing — any path that isn't a real file falls back to
  # index.html so deep links (e.g. /login) don't 404 on a hard refresh.
  location / {
    try_files $uri /index.html;
  }
}
