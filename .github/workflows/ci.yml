name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/task_tracker_test
  REDIS_URL: redis://localhost:6379
  CORS_ORIGIN: http://localhost:5173
  # Ephemeral CI database only — not a real secret, so a fixed value here is fine (same
  # reasoning as the values above). Jest's own setupFiles fall back to an equivalent value
  # for the actual test run; this covers the standalone "Seed RBAC catalog" step, which runs
  # the seed script directly, outside Jest.
  JWT_ACCESS_SECRET: test-only-secret-value-not-used-in-production-00000000
  # Matches test/setup-env.js's own fallback exactly — one canonical test-admin identity,
  # not two independently-drifting literals, is what actually closes the gap Issue 23 flagged.
  ADMIN_SEED_EMAIL: admin@test-tasktracker.local
  ADMIN_SEED_PASSWORD: test-only-admin-password-1

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: task_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate
        working-directory: apps/backend

      - name: Apply database migrations
        run: pnpm run prisma:migrate:deploy
        working-directory: apps/backend

      - name: Build shared packages
        # seed.ts imports @task-tracker/shared-types which resolves to dist/index.js — that
        # file doesn't exist until the package is compiled. prisma:seed runs outside Turbo so
        # Turbo's own ^build dependency ordering never fires for this step.
        run: pnpm turbo run build --filter=@task-tracker/shared-types

      - name: Seed RBAC catalog
        run: pnpm run prisma:seed
        working-directory: apps/backend

      - name: Lint
        run: pnpm turbo run lint

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build

  deploy-staging:
    needs: ci
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    # Overrides the workflow-level group: a second push must queue behind this deploy, never
    # cancel it — cancel-in-progress mid `prisma migrate deploy` can leave a migration marked
    # "started" in _prisma_migrations, which then blocks every later deploy until someone runs
    # `prisma migrate resolve` by hand.
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate
        working-directory: apps/backend

      - name: Apply database migrations
        run: pnpm run prisma:migrate:deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build shared packages
        # Same reason as the ci job — prisma:seed bypasses Turbo so shared-types must be
        # compiled explicitly before the seed step can resolve its imports.
        run: pnpm turbo run build --filter=@task-tracker/shared-types

      - name: Seed RBAC catalog
        run: pnpm run prisma:seed
        working-directory: apps/backend
        env:
          # The seed script imports the app's own env.ts, which validates the full schema
          # eagerly on import (not just DATABASE_URL) — every one of these is required or the
          # step throws before touching the database.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          ADMIN_SEED_EMAIL: ${{ vars.ADMIN_SEED_EMAIL }}
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-tracker-backend-staging:latest
            ghcr.io/${{ github.repository_owner }}/task-tracker-backend-staging:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DigitalOcean App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          GHCR_CREDENTIALS: ${{ github.actor }}:${{ secrets.GHCR_PAT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.staging.yaml

  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    # Same reasoning as deploy-staging's override — queue, never cancel, a live migration.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate
        working-directory: apps/backend

      - name: Apply database migrations
        run: pnpm run prisma:migrate:deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build shared packages
        # Same reason as the ci job — prisma:seed bypasses Turbo so shared-types must be
        # compiled explicitly before the seed step can resolve its imports.
        run: pnpm turbo run build --filter=@task-tracker/shared-types

      - name: Seed RBAC catalog
        run: pnpm run prisma:seed
        working-directory: apps/backend
        env:
          # The seed script imports the app's own env.ts, which validates the full schema
          # eagerly on import (not just DATABASE_URL) — every one of these is required or the
          # step throws before touching the database.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          ADMIN_SEED_EMAIL: ${{ vars.ADMIN_SEED_EMAIL }}
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-tracker-backend-production:latest
            ghcr.io/${{ github.repository_owner }}/task-tracker-backend-production:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DigitalOcean App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          GHCR_CREDENTIALS: ${{ github.actor }}:${{ secrets.GHCR_PAT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.production.yaml
